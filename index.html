<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro RPG FPS - Engine</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: 'Courier New', Courier, monospace;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Pantalla de Bloqueo / Inicio */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #000000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        #main-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 100%;
            height: 100%;
            justify-content: center;
        }
        #menu-title {
            color: #00ff00;
            font-size: 80px;
            font-style: italic;
            text-shadow: 4px 4px 0px #333;
            margin: 0 0 50px 0;
            text-align: center;
        }
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .retro-btn {
            font-family: 'Courier New', Courier, monospace;
            background-color: #000;
            color: #fff;
            font-size: 24px;
            padding: 15px 40px;
            border: 4px outset #fff;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
        }
        .retro-btn:hover {
            background-color: #fff;
            color: #000;
            border-style: inset;
        }
        #menu-footer {
            position: absolute;
            bottom: 20px;
            font-size: 14px;
            color: #888;
            text-align: center;
        }

        /* Pantalla de Muerte */
        #death-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(136, 0, 0, 0.5);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            color: #fff;
            font-size: 40px;
        }

        /* HUD - Barras de Estado */
        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 10;
            color: #fff;
            text-shadow: 2px 2px 0px #000;
            font-size: 16px;
        }
        .bar-container {
            width: 200px;
            height: 20px;
            background-color: #333;
            border: 2px solid #fff;
            margin-bottom: 5px;
            position: relative;
        }
        #health-fill {
            width: 100%;
            height: 100%;
            background-color: #ff4444;
            transition: width 0.1s ease;
        }
        #stamina-fill {
            width: 100%;
            height: 100%;
            background-color: #44ff44;
            transition: width 0.1s ease;
        }
        .bar-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 0;
            font-size: 12px;
            line-height: 16px;
            font-weight: bold;
        }

        /* Hotbar */
        #hotbar-container {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 5px;
            z-index: 10;
            background: rgba(0,0,0,0.6);
            padding: 5px;
            border: 2px solid #555;
        }
        .hotbar-slot {
            width: 50px;
            height: 50px;
            border: 2px solid #888;
            background: #222;
            position: relative;
        }
        .hotbar-slot.active {
            border-color: #ffff44;
            box-shadow: 0px 0px 8px #ffff44;
        }

        /* Minimapa */
        #minimap-container {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 150px;
            height: 150px;
            border: 3px solid #fff;
            z-index: 10;
            background: transparent; /* <--- CAMBIAR ESTO DE #000 A TRANSPARENT */
            overflow: hidden;
            transition: all 0.2s ease;
        }
        #minimap-container.expanded {
            width: 400px;
            height: 400px;
        }

        /* Inventario Contenedor */
        #inventory-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 450px;
            height: 400px;
            background: #1a1a1a;
            border: 4px double #fff;
            z-index: 100;
            display: none;
            flex-direction: column;
            padding: 15px;
            color: #fff;
        }
        #inventory-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 5px;
            flex-grow: 1;
            overflow-y: auto;
        }
        .inv-slot {
            width: 60px;
            height: 60px;
            border: 2px solid #555;
            background: #111;
            position: relative;
        }
        .inv-item {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 10px;
            text-align: center;
            font-weight: bold;
            color: #fff;
            text-shadow: 1px 1px 0px #000;
        }

        /* Chat / Consola */
        #chat-container {
            position: absolute;
            bottom: 100px;
            left: 20px;
            width: 350px;
            height: 200px;
            background: rgba(0,0,0,0.7);
            border: 1px solid #444;
            z-index: 50;
            display: none;
            flex-direction: column;
            padding: 5px;
        }
        #chat-log {
            flex-grow: 1;
            overflow-y: auto;
            color: #fff;
            font-size: 13px;
            margin-bottom: 5px;
        }
        #chat-input {
            width: 100%;
            background: #000;
            border: 1px solid #666;
            color: #fff;
            font-family: monospace;
            padding: 4px;
        }

        /* Cuadro de texto de diálogo / alertas */
        #dialogue-box {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffff44;
            font-size: 18px;
            text-shadow: 2px 2px 0px #000;
            z-index: 10;
        }
        #stats-panel {
            margin-bottom: 15px;
            font-size: 14px;
            border-bottom: 1px dashed #555;
            padding-bottom: 5px;
        }
        #inv-tooltip {
            margin-top: 5px;
            color: #aaa;
            font-size: 11px;
            min-height: 15px;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 20px;
            z-index: 5;
            pointer-events: none;
            text-shadow: 1px 1px 0px #000;
        }
    </style>
</head>
<body>

    <div id="crosshair">+</div>

    <div id="dialogue-box"></div>

    <div id="blocker">
        <div id="main-menu">
            <h1 id="menu-title">Escape</h1>
            <div class="menu-buttons">
                <button id="btn-play" class="retro-btn">Jugar</button>
                <button id="btn-options" class="retro-btn">Opciones</button>
            </div>
            <footer id="menu-footer">Código by IA, Ideas por: Enzo Andino.</footer>
        </div>
    </div>

    <div id="death-screen">
        <div>HAS MUERTO</div>
        <span style="font-size: 16px; margin-top: 10px; color: #ccc;">Recargá la página para reiniciar</span>
    </div>

    <div id="hud">
        <div id="hp-text" style="font-size: 12px; margin-bottom: 2px;">HP: 100 / 100</div>
        <div class="bar-container">
            <div id="health-fill"></div>
        </div>
        <div id="sp-text" style="font-size: 12px; margin-bottom: 2px; margin-top: 5px;">SP: 200 / 200</div>
        <div class="bar-container">
            <div id="stamina-fill"></div>
        </div>
    </div>

    <div id="hotbar-container"></div>

    <div id="minimap-container"></div>

    <div id="inventory-container">
        <div id="stats-panel">
            NIVEL: <span id="level-value">1</span> | 
            XP: <span id="xp-value">0</span> | 
            DAÑO BASE: <span id="weapon-damage-value">10</span>
        </div>
        <div id="inventory-grid"></div>
        <div id="inv-tooltip">Shift+Clic en un objeto para ver descripción.</div>
    </div>

    <div id="chat-container">
        <div id="chat-log"></div>
        <input type="text" id="chat-input" maxlength="50" autocomplete="off">
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';
        import { state, checkMapCollision, takeDamage, updateInventoryUI } from './state.js';
        import { fistsWeapon, swordWeapon } from './weapons.js';
        import { generateLevel } from './level.js';
        import { setupInputs } from './input.js';

        let camera, scene, renderer, minimapCamera;
        let bobbingTimer = 0, bobbingX = 0, bobbingY = 0;

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => init());
        } else {
            init();
        }

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);
            scene.fog = new THREE.FogExp2(0x000000, 0.08);
            

            camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.y = 1.6;

            minimapCamera = new THREE.OrthographicCamera(-20, 20, 20, -20, 0.1, 100);
            minimapCamera.position.y = 50; minimapCamera.lookAt(0, 0, 0);

            const playerHandsGroup = new THREE.Group();
            const skinMat = new THREE.MeshLambertMaterial({ color: 0x8c7a6b, depthTest: false, depthWrite: false });
            const sleeveMat = new THREE.MeshLambertMaterial({ color: 0x4a4a4a, depthTest: false, depthWrite: false });
            
            state.leftArmGroup = new THREE.Group(); state.leftArmGroup.position.set(-0.4, -0.5, -0.8);
            const lArm = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.6, 6), sleeveMat); lArm.rotation.x = Math.PI / 2; lArm.renderOrder = 999;
            const lFist = new THREE.Mesh(new THREE.SphereGeometry(0.12, 6, 6), skinMat); lFist.position.z = -0.3; lFist.renderOrder = 999;
            state.leftArmGroup.add(lArm, lFist);
            
            state.rightArmGroup = state.leftArmGroup.clone(); state.rightArmGroup.position.set(0.4, -0.5, -0.8);
            state.rFist = state.rightArmGroup.children[1];
            
            state.swordGroup = new THREE.Group();
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.8, 0.1), new THREE.MeshLambertMaterial({ color: 0x999999, depthTest: false, depthWrite: false })); blade.position.set(0, 0.49, 0); blade.renderOrder = 999;
            state.swordGroup.add(blade); state.swordGroup.position.set(0, 0.1, -0.3); state.swordGroup.rotation.set(-0.2, 0, 0.1);
            state.rightArmGroup.add(state.swordGroup);

            state.flashlight = new THREE.SpotLight(0xfff3d1, 90, 60, Math.PI / 6, 0.8, 1);
            state.flashlight.position.set(0.08, 0.08, -0.25);
            state.leftArmGroup.add(state.flashlight, state.flashlight.target); state.flashlight.target.position.set(0.08, 0.08, -2);
            
            playerHandsGroup.add(state.leftArmGroup, state.rightArmGroup);
            camera.add(playerHandsGroup); scene.add(camera);

            state.controls = new PointerLockControls(camera, document.body);
            scene.add(state.controls.getObject());

            const blocker = document.getElementById('blocker');
            const playBtn = document.getElementById('btn-play');
            if (playBtn && blocker) {
                playBtn.addEventListener('click', () => { if (!state.isDead && state.controls) state.controls.lock(); });
                state.controls.addEventListener('lock', () => { blocker.style.display = 'none'; });
                state.controls.addEventListener('unlock', () => {
                    if (!state.isChatOpen && !state.isDead && !state.isInventoryOpen) { blocker.style.display = 'flex'; }
                    state.moveForward = state.moveBackward = state.moveLeft = state.moveRight = state.moveRun = false;
                });
            }

            setupInputs(camera);

            // Cargar textura de cielo nocturno estrellado
            const textureLoader = new THREE.TextureLoader();
            const skyTexture = textureLoader.load('https://imgs.search.brave.com/Yn76n6BsfxJh-u-YL9jUv38mLYpAtaxSRrVE_mE5V9w/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9tZWRp/YS5pc3RvY2twaG90/by5jb20vaWQvMjIz/MTAyMTY0Ni9waG90/by8zNjAtZGVncmVl/LWhkcmktc2t5LXBh/bm9yYW1hLXVsdHJh/LWhpZ2gtcmVzb2x1/dGlvbjMwLTAwMHB4/LWZvci12ci1hbmQt/c2t5Ym94LXVzZS5q/cGc_cz02MTJ4NjEy/Jnc9MCZrPTIwJmM9/VDBpLXB4TzZDVHJr/QUQ2MktOb1k2Tm1P/WjJDeTFvc2lKM3k5/NmFObG9UZz0');
            skyTexture.mapping = THREE.EquirectangularReflectionMapping;
            
            // Crear esfera gigante invertida como skybox
            const skySphereGeometry = new THREE.SphereGeometry(90, 32, 32);
            const skySphereMaterial = new THREE.MeshBasicMaterial({ map: skyTexture, side: THREE.BackSide, fog: false });
            const skySphere = new THREE.Mesh(skySphereGeometry, skySphereMaterial);
            scene.add(skySphere);
            state.skySphere = skySphere;

            scene.add(new THREE.AmbientLight(0x404040, 2.0)); // Subimos la intensidad global
            const dirLight = new THREE.DirectionalLight(0xffffff, 0.2); dirLight.position.set(-1, 2, 1).normalize(); scene.add(dirLight);
            
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(200, 200), new THREE.MeshLambertMaterial({ color: 0x3a3024 })); floor.rotation.x = -Math.PI / 2; scene.add(floor);

            generateLevel(scene);
            updateInventoryUI();

            renderer = new THREE.WebGLRenderer({ antialias: false });
            renderer.setPixelRatio(window.devicePixelRatio); renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            renderer.domElement.addEventListener('click', () => {
                if (state.controls && !state.isDead && !state.isInventoryOpen && !state.isChatOpen) {
                    state.controls.lock();
                }
            });

            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now();
            let delta = Math.min((time - state.prevTime) / 1000, 0.1);
            state.prevTime = time;

            if (state.crystals) {
                state.crystals.forEach((c, index) => { c.mesh.rotation.y += delta * 1.5; c.mesh.position.y = c.originY + Math.sin(time / 400 + index) * 0.2; });
            }
            if (state.activeEnemies) {
                state.activeEnemies.forEach(e => e.update(delta, time, state.physicsPosition));
            }

            if (state.worldItems) {
                for (let i = state.worldItems.length - 1; i >= 0; i--) {
                    let item = state.worldItems[i]; item.mesh.rotation.y += delta * 1.5;
                    if (state.physicsPosition.distanceTo(item.mesh.position) < 2.0) {
                        let emptyIndex = state.inventorySlots.indexOf(null);
                        if (emptyIndex !== -1) {
                            state.inventorySlots[emptyIndex] = item; item.mesh.removeFromParent();
                            state.worldItems.splice(i, 1); updateInventoryUI();
                        }
                    }
                }
            }

            if (state.controls && state.controls.isLocked === true && !state.isDead) {
                
                if (state.isAttacking) {
                    state.attackTimer += delta;
                    const hasSword = state.inventorySlots[state.activeHotbarIndex] && state.inventorySlots[state.activeHotbarIndex].name === "Espada de Hierro";
                    
                    if (state.attackTimer >= 0.3) {
                        state.isAttacking = false;
                        state.leftArmGroup.position.z = -0.8; state.rightArmGroup.position.set(0.4, -0.5, -0.8); state.rightArmGroup.rotation.set(0, 0, 0);
                        if (!hasSword) state.currentPunch = state.currentPunch === 'left' ? 'right' : 'left';
                    } else {
                        const progress = state.attackTimer / 0.3;
                        const swing = Math.sin(progress * Math.PI);
                        
                        if (progress > 0.4 && progress < 0.6 && !state.hasDealtDamage) {
                            state.hasDealtDamage = true;
                            const currentWeapon = hasSword ? swordWeapon : fistsWeapon;
                            const raycaster = new THREE.Raycaster(); raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                            const intersects = raycaster.intersectObjects(state.activeEnemies.filter(e => !e.isDead).map(e => e.mesh), true);
                            if (intersects.length > 0 && intersects[0].distance <= currentWeapon.range) {
                                const hitEnemy = state.activeEnemies.find(e => e.mesh === intersects[0].object || e.mesh === intersects[0].object.parent);
                                if (hitEnemy) {
                                    let dmg = state.comboStep === 2 ? currentWeapon.damageCombo2 : (state.comboStep === 3 ? currentWeapon.damageCombo3 : currentWeapon.damageCombo1);
                                    hitEnemy.receiveDamage(dmg, state.physicsPosition);
                                }
                            }
                        }
                        
                        if (hasSword) {
                            if (state.comboStep === 1) { state.rightArmGroup.rotation.x = swing*1.2; state.rightArmGroup.rotation.y = swing*0.5; state.rightArmGroup.rotation.z = swing*0.8; state.rightArmGroup.position.z = -0.8 - swing*0.4; }
                            else if (state.comboStep === 2) { const swing2 = Math.sin(progress * Math.PI * 2); state.rightArmGroup.rotation.x = swing*1.2; state.rightArmGroup.rotation.y = -swing2*0.8; state.rightArmGroup.position.z = -0.8 - swing*0.4; }
                            else { state.rightArmGroup.rotation.x = swing*1.5; state.rightArmGroup.position.z = -0.8 - swing*1.5; state.rightArmGroup.position.y = -0.5 + swing*0.3; state.rightArmGroup.position.x = 0.4 - swing*0.2; }
                        } else {
                            if (state.currentPunch === 'left') state.leftArmGroup.position.z = -0.8 - swing*0.7; else state.rightArmGroup.position.z = -0.8 - swing*0.7;
                        }
                    }
                }

                camera.position.copy(state.physicsPosition);
                state.velocity.x -= state.velocity.x * 12.0 * delta; state.velocity.z -= state.velocity.z * 12.0 * delta;
                state.velocity.y -= (state.isWallSliding ? 4.9 : 9.8) * 5.5 * delta;
                state.controls.getObject().position.y += (state.velocity.y * delta);

                if (state.controls.getObject().position.y <= 1.6) {
                    state.velocity.y = 0; state.controls.getObject().position.y = 1.6; state.canJump = true; state.isWallSliding = false; state.groundTimer += delta;
                    if (state.groundTimer > 0.15) state.bHopSpeedMultiplier = 1.0;
                } else state.groundTimer = 0.0;

                state.direction.z = Number(state.moveForward) - Number(state.moveBackward); state.direction.x = Number(state.moveRight) - Number(state.moveLeft); state.direction.normalize();
                
                let isMoving = state.moveForward || state.moveBackward || state.moveLeft || state.moveRight;
                let currentSpeed = 40.0;
                if (isMoving) {
                    if (state.moveRun && state.stamina > 0) { currentSpeed = 70.0; state.stamina -= 20 * delta; }
                    else state.stamina += 10 * delta;
                } else state.stamina += 35 * delta;
                
                state.stamina = Math.max(0, Math.min(state.maxStamina, state.stamina));
                const staminaFill = document.getElementById('stamina-fill');
                if (staminaFill) staminaFill.style.width = ((state.stamina / state.maxStamina) * 100) + '%';
                const spText = document.getElementById('sp-text');
                if (spText) spText.innerText = `SP: ${Math.ceil(state.stamina)} / ${state.maxStamina}`;
                
                currentSpeed *= state.bHopSpeedMultiplier;
                if (state.moveForward || state.moveBackward) state.velocity.z -= state.direction.z * currentSpeed * delta;
                if (state.moveLeft || state.moveRight) state.velocity.x -= state.direction.x * currentSpeed * delta;

                const pos = state.controls.getObject().position;
                const oldX = pos.x, oldZ = pos.z;
                state.controls.moveRight(-state.velocity.x * delta); state.controls.moveForward(-state.velocity.z * delta);
                const newX = pos.x, newZ = pos.z;
                pos.set(oldX, pos.y, oldZ);
                
                if (!checkMapCollision(newX, oldZ)) pos.x = newX;
                if (!checkMapCollision(pos.x, newZ)) pos.z = newZ;

                state.physicsPosition.copy(camera.position);

                if (isMoving && state.canJump) {
                    bobbingTimer += delta * (state.moveRun ? 2.0 : 1.0);
                    bobbingY = Math.sin(bobbingTimer * 12) * 0.08; bobbingX = Math.cos(bobbingTimer * 6) * 0.05;
                } else {
                    bobbingY = THREE.MathUtils.lerp(bobbingY, 0, 10 * delta); bobbingX = THREE.MathUtils.lerp(bobbingX, 0, 10 * delta);
                }
                camera.translateX(bobbingX); camera.position.y += bobbingY;

                if (state.crystals && state.crystals.some(c => state.physicsPosition.distanceTo(c.mesh.position) < 2.0)) takeDamage(25 * delta);
            } else if (state.controls && !state.controls.isLocked) {
                camera.position.copy(state.physicsPosition);
            }

            // Actualizar posicion del cielo para que siga a la camara (efecto infinito)
            if (state.skySphere) {
                state.skySphere.position.copy(camera.position);
            }

            if (renderer) {
                renderer.autoClear = false; renderer.clear();
                renderer.setViewport(0, 0, window.innerWidth, window.innerHeight); renderer.setScissorTest(false);
                scene.fog.density = 0.08; renderer.render(scene, camera);

                const mapContainer = document.getElementById('minimap-container');
                if (mapContainer) {
                    const rect = mapContainer.getBoundingClientRect();
                    minimapCamera.position.set(state.physicsPosition.x, 50, state.physicsPosition.z); minimapCamera.lookAt(state.physicsPosition.x, 0, state.physicsPosition.z);
                    renderer.setViewport(rect.left, window.innerHeight - rect.bottom, rect.width, rect.height);
                    renderer.setScissor(rect.left, window.innerHeight - rect.bottom, rect.width, rect.height);
                    renderer.setScissorTest(true); scene.fog.density = 0; renderer.render(scene, minimapCamera);
                }
            }
        }
    </script>
</body>
</html>
