            background-color: #000;

        }
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            z-index: 10;
            cursor: pointer;
        }
        #instructions {
            text-align: center;
            text-shadow: 2px 2px 0px #000;
        }
        #ui-container {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #ddd;
            font-size: 20px;
            font-weight: bold;
            z-index: 5;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            gap: 5px;
            text-shadow: 2px 2px 0px #000;
        }
        #health-bar { 
            width: 250px; 
            height: 24px; 
            background: #222; 
            border: 4px solid #555; 
            border-style: outset; /* Borde estilo interfaz vieja de Windows / RPG */
        }
        #health-fill { 
            width: 100%; 
            height: 100%; 
            background: #a30000; /* Rojo oscuro apagado */
            transition: width 0.1s linear; 
        }
        #stamina-bar { 
            width: 250px; 
            height: 24px; 
            background: #222; 
            border: 4px solid #555; 
            border-style: outset;
        }
        #stamina-fill { 
            width: 100%; 
            height: 100%; 
            background: #c9a014; /* Dorado gastado */
            transition: width 0.1s linear; 
        }
        #dialogue-box {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.7); color: white; padding: 20px; border: 4px solid #555;
            border-style: outset; width: 60%; text-align: center; font-size: 24px; display: none;
            z-index: 15; text-shadow: 2px 2px 0px #000; pointer-events: none;
        }
        #minimap-container {
            position: absolute;
            top: 20px; left: 20px;
            width: 150px; height: 150px;
            border: 4px solid #555; border-style: outset;
            border-radius: 50%; opacity: 0.8;
            pointer-events: none; z-index: 10;
            transition: all 0.2s ease;
        }
        #minimap-container.expanded {
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 60%; height: 60vh; /* Se vuelve un mapa rectangular grande */
            border-radius: 0;
            opacity: 0.95;
            background-color: rgba(0, 0, 0, 0.5);
        }
        #death-screen {
            position: absolute;
            width: 100%; 
            height: 100%;
            background-color: #000000;
            color: #ff0000;
            font-size: 72px;
            font-weight: bold;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        #inventory-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: #aaa; border: 6px solid #ddd; border-bottom-color: #555; border-right-color: #555;
            padding: 20px; display: none; z-index: 30; flex-direction: column; align-items: center;
        }
        #inventory-title { color: #000; font-weight: bold; margin-bottom: 10px; font-size: 24px; text-shadow: none; }
        #inventory-grid {
            display: grid; grid-template-columns: repeat(6, 50px); grid-template-rows: repeat(6, 50px); gap: 2px;

        .inv-item {

        #inv-tooltip {

        const offset = Math.floor(mapGrid.length / 2); // Devuelve 7 para centrar el arreglo 15x15

        // Función de Detección AABB (Bounding Box) mediante Grilla
        function checkMapCollision(x, z) {
            // Comprobamos las 4 esquinas del radio del jugador para evitar que los "hombros" atraviesen la pared
            const corners = [
                { cx: x - playerRadius, cz: z - playerRadius },
                { cx: x + playerRadius, cz: z - playerRadius },
                { cx: x - playerRadius, cz: z + playerRadius },
                { cx: x + playerRadius, cz: z + playerRadius }
            ];
            for (let c of corners) {
                // Convertir coordenadas del mundo real a índices de la matriz
                const col = Math.round(c.cx / cellSize) + offset;
                const row = Math.round(c.cz / cellSize) + offset;
                
                // Salir de los límites de la matriz cuenta como chocar contra un muro impenetrable
                if (row < 0 || row >= mapGrid.length || col < 0 || col >= mapGrid[0].length) return 1;
                
                const type = mapGrid[row][col];
                // Muros (1), Columnas (2), Altares (3) y Pared de Casa (6) bloquean el paso.
                // Nota: Los bloques 7 (Techo) y 8 (Puerta) no bloquean el paso en XZ, 
                // permitiendo entrar y explorar los interiores de las casas.
                if (type === 1 || type === 2 || type === 3 || type === 6) return type;
            }
            return 0;
        }

        function updateInventoryUI() {
            const grid = document.getElementById('inventory-grid');
            const hotbar = document.getElementById('hotbar-container');
            grid.innerHTML = '';
            hotbar.innerHTML = '';
            
            for (let i = 0; i < 36; i++) {
                const slotDiv = document.createElement('div');
                slotDiv.className = 'inv-slot';
                
                const item = inventorySlots[i];
                if (item) {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'inv-item';
                    itemDiv.style.backgroundColor = '#' + item.color.toString(16).padStart(6, '0');
                    itemDiv.innerText = item.name === "Objeto Extraño" ? "Obj Ext" : item.name;
                    
                    slotDiv.addEventListener('mousedown', (e) => {
                        if (e.shiftKey && item.name === 'Objeto Extraño') {
                            document.getElementById('inv-tooltip').innerText = "objeto olvidado por un extraño. Posiblemente basura. Solo un loco lo tendría guardado";
                        } else if (e.shiftKey) {
                            document.getElementById('inv-tooltip').innerText = item.name;
                        }
                    });
                    
                    slotDiv.appendChild(itemDiv);
                }
                grid.appendChild(slotDiv);
                
                // --- Sincronización visual de la Hotbar (primeros 6 slots) ---
                if (i < 6) {
                    const hbSlotDiv = document.createElement('div');
                    hbSlotDiv.className = 'hotbar-slot';
                    if (i === activeHotbarIndex) hbSlotDiv.classList.add('active');
                    
                    const slotNum = document.createElement('div');
                    slotNum.style.position = 'absolute'; slotNum.style.top = '2px'; slotNum.style.left = '2px';
                    slotNum.style.fontSize = '10px'; slotNum.style.color = '#fff'; slotNum.style.textShadow = '1px 1px 0px #000';
                    slotNum.innerText = (i + 1).toString();
                    hbSlotDiv.appendChild(slotNum);

                    if (item) {
                        const hbItemDiv = document.createElement('div');
                        hbItemDiv.className = 'inv-item';
                        hbItemDiv.style.backgroundColor = '#' + item.color.toString(16).padStart(6, '0');
                        hbItemDiv.innerText = item.name === "Objeto Extraño" ? "Obj Ext" : item.name;
                        hbSlotDiv.appendChild(hbItemDiv);
                    }
                    
                    hotbar.appendChild(hbSlotDiv);
                }
            }
            
            // --- Alternancia Visual de Equipamiento ---
            if (swordGroup && rFist) {
                const activeItem = inventorySlots[activeHotbarIndex];
                if (activeItem && activeItem.name === "Espada de Hierro") {
                    swordGroup.visible = true;
                    rFist.visible = false;
                } else {
                    swordGroup.visible = false;
                    rFist.visible = true;
                }
            }
        }

        const fistsWeapon = new Weapon("Puños", 2.5, 10, 10, 10);

        // --- SISTEMA DE ENEMIGOS (Clases) ---

            constructor(id, position, hp) {

                this.maxHp = hp;
                this.isDead = false;
                this.mesh = null;
                this.flashTimer = 0;

            takeDamage(amount) {
                if (this.isDead) return;
                this.hp -= amount;
                this.flashTimer = 0.1; // 100ms de parpadeo rojo
                console.log(`[Combate] ${this.id} recibió ${amount} daño. HP restante: ${this.hp}/${this.maxHp}`);
                
                if (this.hp <= 0) {
                    this.isDead = true;
                    if (this.mesh && this.mesh.parent) {
                        this.mesh.parent.remove(this.mesh);
                    }
                    console.log(`[Combate] ¡${this.id} ha muerto!`);
                }
            }
            update(delta, time, playerPos) {
                if (this.isDead || !this.mesh) return;
                
                const flashColor = this.flashTimer > 0 ? 0xff0000 : this.baseColor;
                if (this.flashTimer > 0) this.flashTimer -= delta;

                if (this.mesh.isGroup) {
                    this.mesh.children.forEach(child => {
                        if (child.material) child.material.color.setHex(flashColor);
                    });
                } else if (this.mesh.material) {
                    this.mesh.material.color.setHex(flashColor);
                }
            }
        }

        class TrainingDummy extends Enemy {
            constructor(id, position) {
                super(id, position, 100);
                this.baseColor = 0x440000; // Rombo rojo oscuro
                const geo = new THREE.OctahedronGeometry(1.5, 0); // Polígono tétrico
                const mat = new THREE.MeshLambertMaterial({ color: this.baseColor });
                this.mesh = new THREE.Mesh(geo, mat);
                this.mesh.position.copy(position);
                this.originY = position.y;
            }
            update(delta, time, playerPos) {
                super.update(delta, time, playerPos); // Llamar a la lógica de hitflash del padre
                if (this.isDead) return;
                
                // Animación de levitación inerte
                this.mesh.position.y = this.originY + Math.sin(time / 500) * 0.2;
                this.mesh.rotation.y += delta;
            }
        }
        
        class Zombie extends Enemy {
            constructor(id, position) {
                super(id, position, 150);
                this.baseColor = 0x3e5c32; // Verde podrido
                this.speed = 2.0; // Velocidad balanceada (caminata lenta y tétrica)
                
                this.mesh = new THREE.Group();
                const mat = new THREE.MeshLambertMaterial({ color: this.baseColor });
                
                // Cuerpo
                const bodyGeo = new THREE.CylinderGeometry(0.6, 0.6, 2.0, 8);
                const body = new THREE.Mesh(bodyGeo, mat);
                body.position.y = 1.0;
                this.mesh.add(body);
                
                // Brazo Izquierdo
                const armGeo = new THREE.CylinderGeometry(0.15, 0.15, 1.0, 6);
                const lArm = new THREE.Mesh(armGeo, mat);
                lArm.rotation.x = Math.PI / 2; // Apuntar a -Z (hacia adelante)
                lArm.position.set(-0.7, 1.4, -0.4);
                this.mesh.add(lArm);
                
                // Brazo Derecho
                const rArm = new THREE.Mesh(armGeo, mat);
                rArm.rotation.x = Math.PI / 2;
                rArm.position.set(0.7, 1.4, -0.4);
                this.mesh.add(rArm);
                
                this.mesh.position.copy(position);
            }

            update(delta, time, playerPos) {
                super.update(delta, time, playerPos); 
                if (this.isDead) return;

                const dist = this.mesh.position.distanceTo(playerPos);
                
                // Rango de Agro (15 unidades)
                if (dist < 15.0) {
                    // Mirar al jugador ignorando el eje Y para no inclinarse hacia arriba/abajo
                    this.mesh.lookAt(playerPos.x, this.mesh.position.y, playerPos.z);
                    
                    if (dist > 1.8) {
                        // Persecución con check de colisiones
                        const dir = new THREE.Vector3().subVectors(playerPos, this.mesh.position).normalize();
                        
                        const oldX = this.mesh.position.x;
                        const oldZ = this.mesh.position.z;
                        
                        const newX = oldX + dir.x * this.speed * delta;
                        const newZ = oldZ + dir.z * this.speed * delta;
                        
                        if (!checkMapCollision(newX, oldZ)) this.mesh.position.x = newX;
                        if (!checkMapCollision(oldX, newZ)) this.mesh.position.z = newZ;
                    } else {
                        // Atacar al jugador si está a rango de mordisco
                        takeDamage(15 * delta);
                    }
                }
            }
        }

                        } else {
                            // --- Lógica de Wall Kick (Salto en Pared en el aire) ---
                            const pos = controls.getObject().position;
                            
                            // Vector de movimiento local (WASD)
                            const localDir = new THREE.Vector3(
                                Number(moveRight) - Number(moveLeft),
                                0,
                                Number(moveBackward) - Number(moveForward) // En Three.js, la cámara mira hacia -Z
                            );
                            
                            if (localDir.lengthSq() > 0) {
                                localDir.normalize();
                                // Transformar a dirección global aplicando la rotación de la cámara
                                const worldDir = localDir.clone().applyQuaternion(camera.quaternion);
                                worldDir.y = 0;
                                worldDir.normalize();

                                // Offset de testeo (0.3 unidades adelante de tu movimiento)
                                const checkX = pos.x + worldDir.x * 0.3;
                                const checkZ = pos.z + worldDir.z * 0.3;
                                
                                const hitType = checkMapCollision(checkX, checkZ);
                                
                                if (hitType !== 0) { // Si rozamos algo sólido

                                        velocity.x = (Number(moveRight) - Number(moveLeft)) * 40;

        function takeDamage(amount) {

        function animate() {
            requestAnimationFrame(animate);

            const time = performance.now();
            // Limitar el delta para evitar bugs físicos al cambiar de pestaña
            let delta = (time - prevTime) / 1000;
            if (delta > 0.1) delta = 0.1;
            prevTime = time;

            // Animar cristales de peligro independientemente de la pausa
            crystals.forEach((c, index) => {
                c.mesh.rotation.y += delta * 1.5;
                c.mesh.position.y = c.originY + Math.sin(time / 400 + index) * 0.2;
            });

            const playerPos = physicsPosition; // Usamos la posición física estable sin bamboleo
            
            // Actualizar entidades enemigas
            activeEnemies.forEach(enemy => {
                enemy.update(delta, time, playerPos);
            });

            // Animar y recoger ítems del mundo
            for (let i = worldItems.length - 1; i >= 0; i--) {
                let item = worldItems[i];
                item.mesh.rotation.y += delta * 1.5;
                if (playerPos.distanceTo(item.mesh.position) < 2.0) {
                    let emptyIndex = inventorySlots.indexOf(null);
                    if (emptyIndex !== -1) {
                        inventorySlots[emptyIndex] = item;
                        scene.remove(item.mesh);
                        worldItems.splice(i, 1);
                        updateInventoryUI();
                    }
                }
            }

            // Animar NPCs y chequear diálogos
            let closestText = null;
            let minDistance = 3.5;

            npcs.forEach((npc, index) => {
                // Flotación fantasmal
                npc.group.position.y = npc.originY + Math.sin(time / 600 + index) * 0.3;
                let dist = playerPos.distanceTo(npc.group.position);
                if (dist < minDistance) {
                    minDistance = dist;
                    closestText = npc.text;
                }
            });

            const dialogueBox = document.getElementById('dialogue-box');
            if (closestText && !isDead) {
                dialogueBox.innerText = closestText;
                dialogueBox.style.display = 'block';
            } else {
                dialogueBox.style.display = 'none';
            }

            if (controls.isLocked === true && !isDead) {
                
                // --- Lógica de Animación de Espada y Combos ---
                if (isAttacking) {
                    attackTimer += delta;
                    const activeItem = inventorySlots[activeHotbarIndex];
                    const hasSword = activeItem && activeItem.name === "Espada de Hierro";
                    const attackDuration = 0.3; // Cada golpe dura 0.3 segundos
                    
                    if (attackTimer >= attackDuration) {
                        isAttacking = false;
                        // Restaurar guardia base suavemente
                        leftArmGroup.position.z = -0.8;
                        rightArmGroup.position.set(0.4, -0.5, -0.8);
                        rightArmGroup.rotation.set(0, 0, 0);
                        if (!hasSword) currentPunch = currentPunch === 'left' ? 'right' : 'left';
                    } else {
                        const progress = attackTimer / attackDuration;
                        const swing = Math.sin(progress * Math.PI); // Arco de ida y vuelta suave (0 -> 1 -> 0)
                        
                        // --- Registro de Impactos (Hit Detection) ---
                        // Evaluamos el golpe cuando la espada está en el centro de la animación
                        if (progress > 0.4 && progress < 0.6 && !hasDealtDamage) {
                            hasDealtDamage = true; // Solo pegamos una vez por clic
                            
                            const currentWeapon = hasSword ? swordWeapon : fistsWeapon;
                            
                            const raycaster = new THREE.Raycaster();
                            raycaster.setFromCamera(new THREE.Vector2(0, 0), camera);
                            
                            const enemyMeshes = activeEnemies.filter(e => !e.isDead).map(e => e.mesh);
                            const intersects = raycaster.intersectObjects(enemyMeshes, true);
                            
                            if (intersects.length > 0 && intersects[0].distance <= currentWeapon.range) {
                                const hitObject = intersects[0].object;
                                const hitEnemy = activeEnemies.find(e => e.mesh === hitObject || e.mesh === hitObject.parent);
                                
                                if (hitEnemy) {
                                    let dmg = currentWeapon.damageCombo1;
                                    if (comboStep === 2) dmg = currentWeapon.damageCombo2;
                                    else if (comboStep === 3) dmg = currentWeapon.damageCombo3;
                                    
                                    hitEnemy.takeDamage(dmg);
                                }
                            }
                        }
                        
                        if (hasSword) {
                            if (comboStep === 1) {
                                // Combo 1: Tajo diagonal descendente (/)
                                rightArmGroup.rotation.x = swing * 1.2;  // Corte hacia abajo
                                rightArmGroup.rotation.y = swing * 0.5;  // De arriba a la izquierda hacia abajo a la derecha
                                rightArmGroup.rotation.z = swing * 0.8;  // Inclinación de la hoja
                                rightArmGroup.position.z = -0.8 - swing * 0.4;
                            } else if (comboStep === 2) {
                                // Combo 2: Tajo en forma de X (corte rápido ida y vuelta)
                                const swing2 = Math.sin(progress * Math.PI * 2); // Doble onda (-1 a 1)
                                rightArmGroup.rotation.x = swing * 1.2;  // Mantener brazo abajo
                                rightArmGroup.rotation.y = -swing2 * 0.8; // Barrido inverso para encadenar la 'X'
                                rightArmGroup.rotation.z = -swing2 * 0.5;
                                rightArmGroup.position.z = -0.8 - swing * 0.4;
                            } else if (comboStep === 3) {
                                // Combo 3: Estocada frontal contundente
                                rightArmGroup.rotation.x = swing * 1.5; // Bajar punta 90 grados al frente
                                rightArmGroup.position.z = -0.8 - swing * 1.5; // Empuje profundo en Z
                                rightArmGroup.position.y = -0.5 + swing * 0.3; // Levantar al centro de la cámara
                                rightArmGroup.position.x = 0.4 - swing * 0.2;  // Centrar brazo
                            }
                        } else {
                            // Animación de Boxeo (Puños)
                            const punchOffset = swing * 0.7; 
                            if (currentPunch === 'left') leftArmGroup.position.z = -0.8 - punchOffset;
                            else rightArmGroup.position.z = -0.8 - punchOffset;
                        }
                    }
                }
                
                // --- RESTAURAR POSICIÓN FÍSICA (Elimina el bobbing del frame anterior) ---
                camera.position.copy(physicsPosition);

                // Fricción
                velocity.x -= velocity.x * 12.0 * delta;
                velocity.z -= velocity.z * 12.0 * delta;

                // Gravedad pesada reducida a la mitad si el personaje se desliza por un muro fallido
                if (isWallSliding) {
                    velocity.y -= (9.8 * 5.5 * delta) * 0.5;
                } else {
                    velocity.y -= 9.8 * 5.5 * delta; 
                }

                // Movimiento vertical
                controls.getObject().position.y += (velocity.y * delta);

                // --- Colisión de Cabeza Claustrofóbica (Bloques 7, 8, 3, 4 interiores) ---
                const colIdx = Math.round(controls.getObject().position.x / cellSize) + offset;
                const rowIdx = Math.round(controls.getObject().position.z / cellSize) + offset;
                if (rowIdx >= 0 && rowIdx < mapGrid.length && colIdx >= 0 && colIdx < mapGrid[0].length) {
                    const cType = mapGrid[rowIdx][colIdx];
                    if (cType === 7 || cType === 8 || cType === 3 || cType === 4) {
                        if (controls.getObject().position.y > 3.2) { // Techo está en Y=4, la cámara no puede pasar Y=3.2
                            controls.getObject().position.y = 3.2;
                            if (velocity.y > 0) velocity.y = -2; // Rebote hacia abajo
                        }
                    }
                }

                // Suelo
                if (controls.getObject().position.y <= 1.6) {
                    velocity.y = 0;
                    controls.getObject().position.y = 1.6;
                    canJump = true;
                    wallJumpCount = 0;
                    isWallSliding = false;
                    groundTimer += delta;
                    // Si pasas más de 0.15s en el suelo, se pierde el impulso
                    if (groundTimer > 0.15) {
                        bHopSpeedMultiplier = 1.0;
                    }
                } else {
                    groundTimer = 0.0;
                }

                direction.z = Number(moveForward) - Number(moveBackward);
                direction.x = Number(moveRight) - Number(moveLeft);
                direction.normalize(); // Evitar strafe rápido

                // --- Sistema de Estamina ---
                let isMoving = moveForward || moveBackward || moveLeft || moveRight;
                let currentSpeed = 40.0; // Caminata rapida

                if (isMoving) {
                    if (moveRun && stamina > 0) {
                        currentSpeed = 70.0; // Sprint
                        stamina -= 20 * delta; // Gasto por correr
                    } else {
                        stamina += 10 * delta; // Regen lenta por caminar
                    }
                } else {
                    stamina += 35 * delta; // Regen rápida quieto
                }
                stamina = Math.max(0, Math.min(100, stamina));
                staminaFill.style.width = stamina + '%';
                spText.innerText = `SP: ${Math.ceil(stamina)} / 100`;

                // Aplicar multiplicador de Bunny Hop
                currentSpeed *= bHopSpeedMultiplier;

                // Aplicar movimiento
                if (moveForward || moveBackward) velocity.z -= direction.z * currentSpeed * delta;
                if (moveLeft || moveRight) velocity.x -= direction.x * currentSpeed * delta;

                // --- Lógica de Colisiones por Grilla ---
                const pos = controls.getObject().position;
                const oldX = pos.x;
                const oldZ = pos.z;

                // 1. Simular el desplazamiento local calculado por la cámara
                controls.moveRight(-velocity.x * delta);
                controls.moveForward(-velocity.z * delta);

                const newX = pos.x;
                const newZ = pos.z;

                // 2. Revertir la posición del jugador a su estado anterior para validar ejes individualmente
                pos.set(oldX, pos.y, oldZ);

                // 3. Comprobar colisión en X y aplicar si está libre
                if (!checkMapCollision(newX, oldZ)) pos.x = newX;
                
                // 4. Comprobar colisión en Z y aplicar (usamos la X ya actualizada para mantener el "wall slide")
                if (!checkMapCollision(pos.x, newZ)) pos.z = newZ;

                // --- GUARDAR POSICIÓN FÍSICA ---
                physicsPosition.copy(camera.position);

                // --- HEAD BOBBING (Bamboleo Visual) ---
                if (isMoving && canJump) {
                    bobbingTimer += delta * (moveRun ? 2.0 : 1.0);
                    bobbingY = Math.sin(bobbingTimer * 12) * 0.08;
                    bobbingX = Math.cos(bobbingTimer * 6) * 0.05;
                } else {
                    bobbingY = THREE.MathUtils.lerp(bobbingY, 0, 10 * delta);
                    bobbingX = THREE.MathUtils.lerp(bobbingX, 0, 10 * delta);
                }
                camera.translateX(bobbingX); // Translación X local (no rompe la posición en el mundo)
                camera.position.y += bobbingY;

                // --- Sistema de Daño por Zonas ---
                let takingDamage = false;
                
                crystals.forEach(c => {
                    if (physicsPosition.distanceTo(c.mesh.position) < 2.0) {
                        takingDamage = true;
                    }
                });

                if (takingDamage) {
                    takeDamage(25 * delta); // Quita ~25 HP por segundo
                }
            }

            // ==========================================
            // SISTEMA DE RENDERIZADO DUAL (Principal y Minimapa)
            // ==========================================
            renderer.autoClear = false;
            renderer.clear();

            // 1. Renderizar Escena Principal (Full Screen)
            renderer.setViewport(0, 0, window.innerWidth, window.innerHeight);
            renderer.setScissorTest(false);
            scene.fog.density = 0.08; // Activar niebla para inmersión
            renderer.render(scene, camera);

            // 2. Renderizar Minimapa
            const mapContainer = document.getElementById('minimap-container');
            const rect = mapContainer.getBoundingClientRect();
            const isExpanded = mapContainer.classList.contains('expanded');

            // Actualizar frustum y cámara del minimapa para seguir al jugador
            const mapAspect = rect.width / rect.height;
            const d = isExpanded ? 120 : 25; // Tamaño del área visible expandido para abarcar 40x40
            minimapCamera.left = -d * mapAspect; minimapCamera.right = d * mapAspect;
            minimapCamera.top = d; minimapCamera.bottom = -d;
            minimapCamera.updateProjectionMatrix();
            
            minimapCamera.position.set(playerPos.x, 50, playerPos.z);
            minimapCamera.lookAt(playerPos.x, 0, playerPos.z);

            // Configurar Scissor y Viewport para dibujar solo en el cuadro de UI
            const mapX = rect.left;
            const mapY = window.innerHeight - rect.bottom;
            renderer.setViewport(mapX, mapY, rect.width, rect.height);
            renderer.setScissor(mapX, mapY, rect.width, rect.height);
            renderer.setScissorTest(true);
            
            scene.fog.density = 0; // Desactivar niebla para que el mapa aéreo sea visible
            renderer.render(scene, minimapCamera);
        }
    </script>
</body>
